<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>stash — Settings</title>
    <link rel="stylesheet" href="settings.css" />
  </head>
  <body>
    <main>
      <h1>Pair your phone</h1>
      <p class="hint">Open <strong>stash</strong> on Android and tap <em>Find and Pair Mac</em>. The phone will connect and save this Mac automatically.</p>

      <div id="status" class="status pending">Waiting for phone…</div>

      <details class="manual">
        <summary>Manual fallback</summary>
        <div class="kv"><span>Mac IP</span><code id="host">—</code></div>
        <div class="kv"><span>Port</span><code id="port">—</code></div>
        <div class="kv"><span>Secret</span><code id="secret">—</code></div>
      </details>

      <section class="prefs">
        <label><input id="launch" type="checkbox" /> Launch at login</label>
        <label class="port-row"><span>Port</span><input id="portInput" type="number" min="1" max="65535" /></label>
        <div id="restart" class="restart">Restart stash for the new port to take effect.</div>
      </section>

      <button id="reset" class="reset" type="button">Reset secret</button>
      <p class="footnote">Resetting unpairs your phone — you'll need to re-scan.</p>
    </main>
    <script src="settings.js"></script>
  </body>
</html>
