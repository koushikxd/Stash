appId: dev.koushik.stash
productName: stash
directories:
  output: out
files:
  - dist/**/*
  - assets/**/*
  - package.json
mac:
  category: public.app-category.utilities
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  target:
    - dmg
  extendInfo:
    LSUIElement: true
    NSLocalNetworkUsageDescription: "stash discovers your Mac on the local Wi-Fi to receive links from your phone."
    NSBonjourServices:
      - _stash._tcp
afterSign: build/notarize.js
dmg:
  artifactName: ${productName}-${version}-${arch}.${ext}
